<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f3f3f3;
    }

    .form-box {
      background-color: white;
      border: 2px solid #ccc;
      border-radius: 12px;
      padding: 30px 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }

    p {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 14px;
    }

    input[type="radio"],
    input[type="checkbox"] {
      margin-right: 5px;
      margin-top: 10px;
    }

    a {
      margin-top: 15px;
      display: inline-block;
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .button-group {
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h1>Registration Form</h1>
    <p>Welcome there!!! Let’s get to know about you</p>

    <form action="#" method="post">

      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" required>

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="ex: you@gmail.com" required>

      <label>Gender:</label>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male" style="display:inline;">Male</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female" style="display:inline;">Female</label>

      <label for="country">Country:</label>
      <select id="country">
        <option value="india">India</option>
        <option value="usa">USA</option>
        <option value="uk">UK</option>
        <option value="other">Other</option>
      </select>

      <label>Skills:</label>
      <input type="checkbox" id="html" value="HTML"><label for="html" style="display:inline;">HTML</label>
      <input type="checkbox" id="css" value="CSS"><label for="css" style="display:inline;">CSS</label>
      <input type="checkbox" id="js" value="JS"><label for="js" style="display:inline;">JavaScript</label>

      <br><a href="/education.html">Documents submission</a>

      <div class="button-group">
        <button type="submit">Submit</button>
        <button type="reset">Clear</button>
      </div>

    </form>
  </div>

</body>
</html>
